# Jekyll config for the Nutrication public site (GitHub Pages).
# Renders the landing page + legal docs at https://nutrication.app.

title: Nutrication
description: Honest food grades, backed by science.
url: https://nutrication.app
baseurl: ""

# Use GitHub's built-in markdown renderer.
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Pretty URLs: /privacy/ instead of /privacy.html
permalink: pretty

# Strip files the public site doesn't need.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md

# We ship our own _layouts/default.html so we control the chrome end-to-end.
# No gem theme = no third-party footer / branding / hosted-on links.
