# Jekyll config for the Nutrication legal pages (GitHub Pages).
# This is the smallest workable config — just enough to render markdown
# with sane defaults. No external themes, no plugins, no maintenance.

title: Nutrication
description: Honest food grades, backed by science.
url: https://nutrication.app   # change to your real domain when ready
baseurl: ""

# Use GitHub's built-in markdown renderer.
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Pretty URLs: /privacy/ instead of /privacy.html
permalink: pretty

# Strip files the public site doesn't need.
# Internal-only docs (deployment, cost, strategy) live in this folder for
# convenience but should NEVER be rendered as public pages.
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - alternatives-feature-plan.md
  - deployment-guide.md
  - launch-cost-capacity.md
  - product-analysis.md

# A minimal theme that ships with GitHub Pages (no extra plugins to enable).
theme: jekyll-theme-minimal
