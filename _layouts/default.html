<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Open Graph / social previews -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:site_name" content="{{ site.title }}">

  <!-- Brand fonts: DM Sans (body) + Fraunces (display) — same as the app -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Fraunces:opsz,wght@9..144,400;9..144,700&display=swap">

  <style>
    :root {
      --bg:          #F7F5F0;
      --bg-deep:     #EFE9DC;
      --card:        #FFFFFF;
      --text:        #0F1A12;
      --text-subtle: #2B3A2E;
      --text-muted:  #535F58;
      --primary:     #1B4332;
      --primary-dk:  #0F2A22;
      --primary-soft:#D8ECDF;
      --divider:     #E2DCC9;
      --accent:      #A8E6CF;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:          #0F1A12;
        --bg-deep:     #0A1410;
        --card:        #1A2A20;
        --text:        #F7F5F0;
        --text-subtle: #CFD8D2;
        --text-muted:  #95A29A;
        --primary:     #A8E6CF;
        --primary-dk:  #7CCFA9;
        --primary-soft:#1F3D2E;
        --divider:     #22332A;
      }
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.55;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Top brand strip */
    .topbar {
      background: var(--bg-deep);
      border-bottom: 1px solid var(--divider);
    }
    .topbar-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
    }
    .brand-mark {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #34D27D 0%, #1B4332 100%);
      display: inline-flex; align-items: center; justify-content: center;
      color: #fff; font-family: 'Fraunces', Georgia, serif;
      font-weight: 700; font-size: 20px; line-height: 1;
      box-shadow: 0 4px 14px rgba(15,26,18,0.15);
    }
    .brand-name {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700; font-size: 20px; letter-spacing: -0.3px;
    }
    .nav {
      display: flex; gap: 20px; align-items: center;
    }
    .nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
    .nav a:hover, .nav a:focus-visible {
      color: var(--primary);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* Content */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }

    h1, h2, h3, h4 {
      font-family: 'Fraunces', Georgia, serif;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.15;
      margin: 1.5em 0 0.5em;
    }
    h1 { font-size: clamp(32px, 5vw, 44px); letter-spacing: -1.2px; margin-top: 0; }
    h2 { font-size: clamp(22px, 3vw, 28px); letter-spacing: -0.8px; }
    h3 { font-size: 18px; font-family: 'DM Sans', system-ui, sans-serif; font-weight: 700; letter-spacing: -0.2px; }
    p, li { color: var(--text-subtle); font-size: 16px; }
    strong { color: var(--text); }

    a { color: var(--primary); text-decoration: underline; text-underline-offset: 3px; }
    a:hover { color: var(--primary-dk); }

    code {
      background: var(--bg-deep);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    hr {
      border: 0;
      border-top: 1px solid var(--divider);
      margin: 32px 0;
    }

    blockquote {
      border-left: 3px solid var(--primary);
      margin: 24px 0;
      padding: 4px 20px;
      color: var(--text-subtle);
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--divider);
      background: var(--bg-deep);
      margin-top: 80px;
    }
    .footer-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .footer-meta {
      color: var(--text-muted);
      font-size: 13px;
    }
    .footer-links {
      display: flex; gap: 20px;
    }
    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }
    .footer-links a:hover {
      color: var(--primary);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="/" class="brand" aria-label="Nutrication home">
        <span class="brand-mark" aria-hidden="true">N</span>
        <span class="brand-name">{{ site.title }}</span>
      </a>
      <nav class="nav" aria-label="Primary">
        <a href="/privacy/">Privacy</a>
        <a href="/terms/">Terms</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-meta">
        &copy; {{ site.time | date: '%Y' }} {{ site.title }}. {{ site.description }}
      </div>
      <div class="footer-links">
        <a href="/privacy/">Privacy</a>
        <a href="/terms/">Terms</a>
        <a href="mailto:support@nutrication.app">Contact</a>
      </div>
    </div>
  </footer>
</body>
</html>
